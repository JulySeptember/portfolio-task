openapi: 3.0.3
info:
  title: Task Management API
  description: |
    REST API for the Task Management application.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: task
    description: Task operations
  - name: user
    description: User operations

paths:
  ##############################
  # Task Endpoints
  ##############################
  /tasks:
    get:
      tags: [task]
      summary: List tasks
      operationId: listTasks
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/Status"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

    post:
      tags: [task]
      summary: Create a new task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskBody"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64

    get:
      tags: [task]
      summary: Get a task by ID
      operationId: getTask
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

    patch:
      tags: [task]
      summary: Update a task
      operationId: updateTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskBody"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

    delete:
      tags: [task]
      summary: Delete a task
      operationId: deleteTask
      responses:
        "204":
          description: Task deleted

  ##############################
  # User Endpoints
  ##############################
  /users:
    get:
      tags: [user]
      summary: List users
      operationId: listUsers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

    post:
      tags: [user]
      summary: Create a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64

    get:
      tags: [user]
      summary: Get user by ID
      operationId: getUser
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    put:
      tags: [user]
      summary: Update user
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      tags: [user]
      summary: Delete user
      operationId: deleteUser
      responses:
        "204":
          description: User deleted

  /users/current:
    get:
      tags: [user]
      summary: Get current user
      operationId: getCurrentUser
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

components:
  schemas:
    ##############################
    # Task Schemas
    ##############################
    Status:
      type: string
      enum: [TODO, DOING, DONE]

    Task:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true

    TaskBody:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/Status"

    ##############################
    # User Schemas
    ##############################
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        display_name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true

    UserBody:
      type: object
      required: [email, display_name]
      properties:
        email:
          type: string
        display_name:
          type: string
