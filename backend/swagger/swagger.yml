openapi: 3.0.3

info:
  title: Task Management API
  description: |
    Full-stack task management REST API built with:

    - Go
    - AWS Lambda
    - API Gateway HTTP API v2
    - RDS MySQL
    - Terraform
    - Cognito JWT Authentication
    - Next.js

  version: 2.0.0

servers:
  - url: /
    description: Current environment

tags:
  - name: health
  - name: users
  - name: tasks

security:
  - bearerAuth: []

paths:
  # ========================================
  # health
  # ========================================

  /health:
    get:
      tags:
        - health

      summary: Health check

      security: []

      responses:
        "200":
          description: OK

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ========================================
  # users
  # ========================================

  /api/v1/users/me:
    get:
      tags:
        - users

      summary: Get current user

      operationId: getCurrentUser

      responses:
        "200":
          description: OK

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - users

      summary: Delete current user

      operationId: deleteCurrentUser

      responses:
        "204":
          description: No Content

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"

  # ========================================
  # tasks
  # ========================================

  /api/v1/tasks:
    get:
      tags:
        - tasks

      summary: List tasks

      operationId: listTasks

      parameters:
        - name: limit
          in: query

          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20

        - name: offset
          in: query

          schema:
            type: integer
            minimum: 0
            default: 0

        - name: status
          in: query

          schema:
            $ref: "#/components/schemas/TaskStatus"

        - name: sort
          in: query

          schema:
            type: string

            enum:
              - created_at
              - due_date

            default: created_at

        - name: order
          in: query

          schema:
            type: string

            enum:
              - ASC
              - DESC

            default: DESC

      responses:
        "200":
          description: OK

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - tasks

      summary: Create task

      operationId: createTask

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"

      responses:
        "201":
          description: Created

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/tasks/{publicId}:
    parameters:
      - name: publicId
        in: path
        required: true

        schema:
          type: string
          format: uuid

    get:
      tags:
        - tasks

      summary: Get task

      description: Public-facing task endpoint

      operationId: getTask

      responses:
        "200":
          description: OK

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/TaskNotFoundError"

        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags:
        - tasks

      summary: Update task

      operationId: updateTask

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"

      responses:
        "200":
          description: Updated

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/TaskNotFoundError"

        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - tasks

      summary: Delete task

      operationId: deleteTask

      responses:
        "204":
          description: No Content

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/TaskNotFoundError"

        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/tasks/{publicId}/status:
    parameters:
      - name: publicId
        in: path
        required: true

        schema:
          type: string
          format: uuid

    patch:
      tags:
        - tasks

      summary: Update task status

      operationId: updateTaskStatus

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusRequest"

      responses:
        "200":
          description: Updated

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/TaskNotFoundError"

        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http

      scheme: bearer

      bearerFormat: JWT

  responses:
    BadRequestError:
      description: Bad request

      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    UnauthorizedError:
      description: Unauthorized

      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: Internal server error

      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: Validation error

      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

    TaskNotFoundError:
      description: Task not found

      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ========================================
    # common
    # ========================================

    HealthResponse:
      type: object

      properties:
        status:
          type: string

      required:
        - status

    ErrorResponse:
      type: object

      properties:
        code:
          type: string

        message:
          type: string

      required:
        - code
        - message

    ValidationErrorResponse:
      type: object

      properties:
        code:
          type: string

        message:
          type: string

        errors:
          type: object

          additionalProperties:
            type: string

      required:
        - code
        - message
        - errors

    # ========================================
    # task
    # ========================================

    TaskStatus:
      type: string

      enum:
        - TODO
        - DOING
        - DONE

    TaskResponse:
      type: object

      properties:
        public_id:
          type: string
          format: uuid

        title:
          type: string
          minLength: 1
          maxLength: 255

        description:
          type: string
          nullable: true
          maxLength: 5000

        status:
          $ref: "#/components/schemas/TaskStatus"

        due_date:
          type: string
          format: date-time
          nullable: true

        created_at:
          type: string
          format: date-time

        updated_at:
          type: string
          format: date-time

      required:
        - public_id
        - title
        - status
        - created_at
        - updated_at

    TaskListResponse:
      type: object

      properties:
        count:
          type: integer

        limit:
          type: integer

        offset:
          type: integer

        items:
          type: array

          items:
            $ref: "#/components/schemas/TaskResponse"

      required:
        - count
        - limit
        - offset
        - items

    CreateTaskRequest:
      type: object

      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255

        description:
          type: string
          nullable: true
          maxLength: 5000

        status:
          $ref: "#/components/schemas/TaskStatus"

        due_date:
          type: string
          format: date-time
          nullable: true

      required:
        - title
        - status

    UpdateTaskRequest:
      type: object

      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255

        description:
          type: string
          nullable: true
          maxLength: 5000

        status:
          $ref: "#/components/schemas/TaskStatus"

        due_date:
          type: string
          format: date-time
          nullable: true

      required:
        - title
        - status

    UpdateTaskStatusRequest:
      type: object

      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"

      required:
        - status

    # ========================================
    # user
    # ========================================

    UserResponse:
      type: object

      properties:
        id:
          type: integer
          format: int64

        email:
          type: string
          format: email

        created_at:
          type: string
          format: date-time

        updated_at:
          type: string
          format: date-time

      required:
        - id
        - email
        - created_at
        - updated_at
