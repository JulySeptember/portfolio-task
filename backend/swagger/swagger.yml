openapi: 3.0.3

info:
  title: Task Management API
  description: REST API for the Task Management application.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: task
    description: Task operations

  - name: user
    description: User operations

paths:
  ##############################
  # Tasks
  ##############################

  /tasks:
    get:
      tags: [task]
      summary: List tasks
      operationId: listTasks

      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50

        - name: offset
          in: query
          schema:
            type: integer
            default: 0

        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/Status"

      responses:
        "200":
          description: Successful operation

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"

    post:
      tags: [task]
      summary: Create task
      operationId: createTask

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"

      responses:
        "201":
          description: Task created

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true

        schema:
          type: integer
          format: int64

    get:
      tags: [task]
      summary: Get task
      operationId: getTask

      responses:
        "200":
          description: Successful operation

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

        "404":
          description: Task not found

    put:
      tags: [task]
      summary: Update task
      operationId: updateTask

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"

      responses:
        "200":
          description: Task updated

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

    delete:
      tags: [task]
      summary: Delete task
      operationId: deleteTask

      responses:
        "204":
          description: Task deleted

  ##############################
  # Users
  ##############################

  /users:
    post:
      tags: [user]
      summary: Create user
      operationId: createUser

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"

      responses:
        "201":
          description: User created

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true

        schema:
          type: integer
          format: int64

    get:
      tags: [user]
      summary: Get user
      operationId: getUser

      responses:
        "200":
          description: Successful operation

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

        "404":
          description: User not found

    put:
      tags: [user]
      summary: Update user
      operationId: updateUser

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"

      responses:
        "200":
          description: User updated

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      tags: [user]
      summary: Delete user
      operationId: deleteUser

      responses:
        "204":
          description: User deleted

components:
  schemas:
    ##############################
    # ENUM
    ##############################

    Status:
      type: string
      enum:
        - TODO
        - DOING
        - DONE

    ##############################
    # Task
    ##############################

    Task:
      type: object

      properties:
        id:
          type: integer
          format: int64

        user_id:
          type: integer
          format: int64

        title:
          type: string

        description:
          type: string

        status:
          $ref: "#/components/schemas/Status"

        due_date:
          type: string
          format: date-time
          nullable: true

        created_at:
          type: string
          format: date-time

        updated_at:
          type: string
          format: date-time

    TaskWithUser:
      type: object

      properties:
        task_id:
          type: integer
          format: int64

        title:
          type: string

        status:
          $ref: "#/components/schemas/Status"

        user_id:
          type: integer
          format: int64

        user_email:
          type: string

    TaskListResponse:
      type: object

      properties:
        count:
          type: integer

        items:
          type: array

          items:
            $ref: "#/components/schemas/TaskWithUser"

        limit:
          type: integer

        offset:
          type: integer

    CreateTaskRequest:
      type: object

      required:
        - user_id
        - title

      properties:
        user_id:
          type: integer
          format: int64

        title:
          type: string

        description:
          type: string

        status:
          $ref: "#/components/schemas/Status"

        due_date:
          type: string
          format: date-time

    UpdateTaskRequest:
      type: object

      properties:
        title:
          type: string

        description:
          type: string

        status:
          $ref: "#/components/schemas/Status"

        due_date:
          type: string
          format: date-time

    ##############################
    # User
    ##############################

    User:
      type: object

      properties:
        id:
          type: integer
          format: int64

        email:
          type: string

        display_name:
          type: string

        created_at:
          type: string
          format: date-time

        updated_at:
          type: string
          format: date-time

    CreateUserRequest:
      type: object

      required:
        - email
        - display_name

      properties:
        email:
          type: string

        display_name:
          type: string

    UpdateUserRequest:
      type: object

      properties:
        email:
          type: string

        display_name:
          type: string
