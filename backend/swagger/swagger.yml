openapi: 3.0.3

info:
  title: Task Management API
  description: |
    Full-stack task management REST API built with:

    - Go
    - AWS Lambda
    - API Gateway
    - RDS MySQL
    - Terraform
    - Cognito JWT Authentication

    This API adopts layered architecture:

    - Handler
    - Service
    - Repository

    and focuses on:

    - maintainability
    - testability
    - secure API design
    - cloud-native architecture

  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: health
    description: Health check endpoints

  - name: task
    description: Task operations

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags:
        - health

      summary: Health check
      description: Check API availability

      security: []

      responses:
        "200":
          description: OK

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/tasks:
    get:
      tags:
        - task

      summary: List tasks
      description: Get authenticated user's tasks
      operationId: listTasks

      parameters:
        - name: limit
          in: query

          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20

        - name: offset
          in: query

          schema:
            type: integer
            minimum: 0
            default: 0

      responses:
        "200":
          description: Task list

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - task

      summary: Create task
      description: Create a new task
      operationId: createTask

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"

      responses:
        "201":
          description: Task created

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true

        schema:
          type: integer
          format: int64

    get:
      tags:
        - task

      summary: Get task
      operationId: getTask

      responses:
        "200":
          description: Task found

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/TaskNotFoundError"

        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags:
        - task

      summary: Update task
      operationId: updateTask

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"

      responses:
        "200":
          description: Task updated

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/TaskNotFoundError"

        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - task

      summary: Delete task
      operationId: deleteTask

      responses:
        "204":
          description: Task deleted

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/TaskNotFoundError"

        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequestError:
      description: Bad request

      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    UnauthorizedError:
      description: Unauthorized

      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: Internal server error

      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: Validation failed

      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

    TaskNotFoundError:
      description: Task not found

      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object

      properties:
        status:
          type: string
          example: ok

      required:
        - status

    ErrorResponse:
      type: object

      properties:
        code:
          type: string
          example: INTERNAL_SERVER_ERROR

        message:
          type: string
          example: internal server error

      required:
        - code
        - message

    ValidationErrorResponse:
      type: object

      properties:
        code:
          type: string

        message:
          type: string

        errors:
          type: object

          additionalProperties:
            type: string

      required:
        - code
        - message
        - errors

    TaskStatus:
      type: string

      enum:
        - TODO
        - DOING
        - DONE

      example: TODO

    TaskResponse:
      type: object

      properties:
        id:
          type: integer
          format: int64

        title:
          type: string

        description:
          type: string

        status:
          $ref: "#/components/schemas/TaskStatus"

        due_date:
          type: string
          format: date-time
          nullable: true

        created_at:
          type: string
          format: date-time

        updated_at:
          type: string
          format: date-time

      required:
        - id
        - title
        - status
        - created_at
        - updated_at

    TaskListResponse:
      type: object

      properties:
        items:
          type: array

          items:
            $ref: "#/components/schemas/TaskResponse"

        count:
          type: integer

        limit:
          type: integer

        offset:
          type: integer

      required:
        - items
        - count
        - limit
        - offset

    CreateTaskRequest:
      type: object

      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255

        description:
          type: string
          maxLength: 5000

        status:
          $ref: "#/components/schemas/TaskStatus"

        due_date:
          type: string
          format: date-time
          nullable: true

      required:
        - title
        - status

    UpdateTaskRequest:
      type: object

      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255

        description:
          type: string
          maxLength: 5000

        status:
          $ref: "#/components/schemas/TaskStatus"

        due_date:
          type: string
          format: date-time
          nullable: true

      required:
        - title
        - status
