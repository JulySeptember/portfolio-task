openapi: 3.0.3

info:
  title: Task Management API
  description: |
    Full-stack task management REST API built with:

    - Go
    - AWS Lambda
    - API Gateway
    - RDS MySQL
    - Terraform
    - Cognito JWT Authentication

  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: health
  - name: task

security:
  - bearerAuth: []

paths:
  # =========================
  # health
  # =========================
  /health:
    get:
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: OK

  # =========================
  # tasks collection
  # =========================
  /api/v1/tasks:
    get:
      tags: [task]
      summary: List tasks
      operationId: listTasks

      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20

        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0

        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TaskStatus"

        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at, due_date]
            default: created_at

        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [task]
      summary: Create task
      operationId: createTask

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"

      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================
  # task single
  # =========================
  /api/v1/tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64

    get:
      tags: [task]
      summary: Get task
      operationId: getTask

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/TaskNotFoundError"

        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags: [task]
      summary: Update task
      operationId: updateTask

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/TaskNotFoundError"

        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [task]
      summary: Delete task
      operationId: deleteTask

      responses:
        "204":
          description: No Content

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/TaskNotFoundError"

        "500":
          $ref: "#/components/responses/InternalServerError"

  # =========================
  # PATCH status only
  # =========================
  /api/v1/tasks/{id}/status:
    patch:
      tags: [task]
      summary: Update task status only
      operationId: updateTaskStatus

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusRequest"

      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

        "400":
          $ref: "#/components/responses/ValidationError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/TaskNotFoundError"

        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

    TaskNotFoundError:
      description: Task not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
      required: [code, message]

    ValidationErrorResponse:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: string
      required: [code, message, errors]

    TaskStatus:
      type: string
      enum: [TODO, DOING, DONE]

    TaskResponse:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        status:
          $ref: "#/components/schemas/TaskStatus"
        due_date:
          type: string
          format: date-time
          nullable: true
        created_at: { type: string }
        updated_at: { type: string }
      required:
        - id
        - title
        - status
        - created_at
        - updated_at

    TaskListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TaskResponse"
        count: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
      required: [items, count, limit, offset]

    CreateTaskRequest:
      type: object
      required: [title, status]
      properties:
        title: { type: string }
        description: { type: string }
        status:
          $ref: "#/components/schemas/TaskStatus"
        due_date:
          type: string
          format: date-time
          nullable: true

    UpdateTaskRequest:
      type: object
      required: [title, status]
      properties:
        title: { type: string }
        description: { type: string }
        status:
          $ref: "#/components/schemas/TaskStatus"
        due_date:
          type: string
          format: date-time
          nullable: true

    UpdateTaskStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"
