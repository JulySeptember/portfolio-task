name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "Makefile"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Run CI
        run: make backend-ci
